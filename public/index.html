<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragdoll Fight – Multiplayer</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #e94560;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height:100vh; width:100vw;
            overflow:hidden;
            font-family:'Segoe UI','Arial',sans-serif;
            user-select:none; -webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;
        }

        #gameContainer {
            position:relative;
            width:100vw; height:100vh;
            max-width:1400px; max-height:900px;
            display:flex; justify-content:center; align-items:center;
        }

        canvas {
            display:block;
            border-radius:12px;
            box-shadow:0 0 60px rgba(233,68,96,0.15), 0 0 120px rgba(0,0,0,0.5);
            background:#1e2a3a;
            cursor:crosshair;
            max-width:100%; max-height:100%;
        }

        #uiOverlay {
            position:absolute; top:16px; left:50%; transform:translateX(-50%);
            display:flex; gap:16px; align-items:center;
            pointer-events:none; z-index:10;
        }

        #statusBadge {
            background:var(--surface); color:var(--text);
            padding:8px 18px; border-radius:24px;
            font-size:13px; font-weight:600; letter-spacing:0.5px;
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
            transition:all 0.3s;
        }
        #statusBadge.connected {
            border-color:#2ecc71; color:#2ecc71;
            box-shadow:0 0 20px rgba(46,204,113,0.2);
        }
        #statusBadge.disconnected {
            border-color:#e74c3c; color:#e74c3c;
            box-shadow:0 0 20px rgba(231,76,60,0.2);
        }

        #playerCount {
            background:var(--surface); color:#f39c12;
            padding:8px 18px; border-radius:24px;
            font-size:13px; font-weight:600; letter-spacing:0.5px;
            border:1px solid rgba(243,156,18,0.4);
            backdrop-filter:blur(10px);
        }

        #controlsHint {
            position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
            background:rgba(22,33,62,0.85); color:#aaa;
            padding:10px 22px; border-radius:20px;
            font-size:11px; letter-spacing:0.4px;
            pointer-events:none; backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.08);
            text-align:center; line-height:1.6;
        }
        #controlsHint span { color:#e94560; font-weight:700; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiOverlay">
            <div id="statusBadge" class="disconnected">● Forbinder…</div>
            <div id="playerCount">Spillere: 1</div>
        </div>
        <div id="controlsHint">
            <span>WASD / Piletaster</span> = Bevæg · <span>Mellemrum</span> = Hop ·
            <span>Venstre klik</span> = Slå / dash · <span>Højre klik</span> = Slå / dash ·
            <span>Træk med mus</span> = Kast dig selv
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
    (function(){
        // ─────────────────────────────────────
        // KONFIGURATION
        // ─────────────────────────────────────
        const GAME_WIDTH = 1200;
        const GAME_HEIGHT = 700;
        const NETWORK_RATE = 30;
        const NETWORK_INTERVAL = 1000 / NETWORK_RATE;
        const RESPAWN_Y = 780;
        const GROUND_Y = 640;
        const GROUND_THICK = 80;

        const PLAYER_COLORS = [
            '#4A90D9','#E74C3C','#2ECC71','#F39C12',
            '#9B59B6','#1ABC9C','#E67E22','#3498DB',
            '#E91E63','#00BCD4','#FF5722','#8BC34A'
        ];

        // ─── DOM ──────────────────────────────
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusBadge = document.getElementById('statusBadge');
        const playerCountEl = document.getElementById('playerCount');
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // ─── MATTER.JS ────────────────────────
        const { Engine, World, Bodies, Body, Constraint, Events, Composite, Vector, Bounds } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 1.2;
        engine.gravity.x = 0;
        const world = engine.world;

        // ─── STATISKE PLATFORME ───────────────
        const platforms = [];
        function createPlatform(x,y,w,h,label='platform'){
            const p = Bodies.rectangle(x,y,w,h,{isStatic:true,friction:0.9,restitution:0.1,render:{fillStyle:'#3d5068'},label});
            platforms.push(p);
            return p;
        }
        const ground = createPlatform(GAME_WIDTH/2, GROUND_Y+GROUND_THICK/2, GAME_WIDTH, GROUND_THICK,'ground');
        World.add(world,[
            ground,
            Bodies.rectangle(-30,GAME_HEIGHT/2,60,GAME_HEIGHT*2,{isStatic:true,label:'wall'}),
            Bodies.rectangle(GAME_WIDTH+30,GAME_HEIGHT/2,60,GAME_HEIGHT*2,{isStatic:true,label:'wall'}),
            Bodies.rectangle(GAME_WIDTH/2,-30,GAME_WIDTH,60,{isStatic:true,label:'wall'}),
            createPlatform(280,470,190,18), createPlatform(680,410,170,18),
            createPlatform(500,290,150,18), createPlatform(880,340,200,18),
            createPlatform(150,300,130,18), createPlatform(1000,500,140,18)
        ]);

        const spawnPoints = [
            {x:350,y:160},{x:600,y:140},{x:850,y:160},{x:200,y:200},
            {x:1000,y:200},{x:500,y:120},{x:700,y:130}
        ];
        function randomSpawn(){ return spawnPoints[Math.floor(Math.random()*spawnPoints.length)]; }

        // ─── RAGDOLL BYGGER ─────────────────
        function createRagdoll(x,y,color,collisionGroup){
            const headR=17, utW=28,utH=38, ltW=24,ltH=34;
            const uaW=11,uaH=28, law=9,laH=26, ulW=13,ulH=34, llW=11,llH=30;

            const parts = {};
            const headY = y;
            const utY = headY + headR + utH/2;
            const ltY = utY + utH/2 + ltH/2;
            const shoulderY = headY + headR + 4;
            const hipY = utY + utH/2 - 4;

            parts.head = Bodies.circle(x,headY,headR,{label:'head',restitution:0.2,friction:0.5,density:0.002,collisionFilter:{group:collisionGroup}});
            parts.upperTorso = Bodies.rectangle(x,utY,utW,utH,{label:'upperTorso',restitution:0.2,friction:0.5,density:0.003,collisionFilter:{group:collisionGroup}});
            parts.lowerTorso = Bodies.rectangle(x,ltY,ltW,ltH,{label:'lowerTorso',restitution:0.2,friction:0.5,density:0.0025,collisionFilter:{group:collisionGroup}});

            const armOffX = utW/2 + uaW/2 -1;
            parts.leftUpperArm  = Bodies.rectangle(x-armOffX, shoulderY+uaH/2, uaW,uaH,{label:'leftUpperArm',restitution:0.2,friction:0.5,density:0.0015,collisionFilter:{group:collisionGroup}});
            parts.rightUpperArm = Bodies.rectangle(x+armOffX, shoulderY+uaH/2, uaW,uaH,{label:'rightUpperArm',restitution:0.2,friction:0.5,density:0.0015,collisionFilter:{group:collisionGroup}});
            const laY = shoulderY + uaH;
            parts.leftLowerArm  = Bodies.rectangle(x-armOffX, laY+laH/2, law,laH,{label:'leftLowerArm',restitution:0.2,friction:0.5,density:0.0012,collisionFilter:{group:collisionGroup}});
            parts.rightLowerArm = Bodies.rectangle(x+armOffX, laY+laH/2, law,laH,{label:'rightLowerArm',restitution:0.2,friction:0.5,density:0.0012,collisionFilter:{group:collisionGroup}});

            const legOffX = ltW/3;
            const ulTopY = ltY + ltH/2;
            parts.leftUpperLeg  = Bodies.rectangle(x-legOffX, ulTopY+ulH/2, ulW,ulH,{label:'leftUpperLeg',restitution:0.2,friction:0.6,density:0.002,collisionFilter:{group:collisionGroup}});
            parts.rightUpperLeg = Bodies.rectangle(x+legOffX, ulTopY+ulH/2, ulW,ulH,{label:'rightUpperLeg',restitution:0.2,friction:0.6,density:0.002,collisionFilter:{group:collisionGroup}});
            const llTopY = ulTopY + ulH;
            parts.leftLowerLeg  = Bodies.rectangle(x-legOffX, llTopY+llH/2, llW,llH,{label:'leftLowerLeg',restitution:0.2,friction:0.6,density:0.0018,collisionFilter:{group:collisionGroup}});
            parts.rightLowerLeg = Bodies.rectangle(x+legOffX, llTopY+llH/2, llW,llH,{label:'rightLowerLeg',restitution:0.2,friction:0.6,density:0.0018,collisionFilter:{group:collisionGroup}});

            const stiff=0.6, damp=0.08;
            const constraints = [
                Constraint.create({bodyA:parts.head,bodyB:parts.upperTorso,pointA:{x:0,y:headR},pointB:{x:0,y:-utH/2},stiffness:stiff,damping:damp,length:2}),
                Constraint.create({bodyA:parts.upperTorso,bodyB:parts.lowerTorso,pointA:{x:0,y:utH/2},pointB:{x:0,y:-ltH/2},stiffness:stiff*1.2,damping:damp,length:1}),
                Constraint.create({bodyA:parts.upperTorso,bodyB:parts.leftUpperArm,pointA:{x:-utW/2+3,y:-utH/2+6},pointB:{x:0,y:-uaH/2},stiffness:stiff*0.7,damping:damp*1.5,length:1}),
                Constraint.create({bodyA:parts.upperTorso,bodyB:parts.rightUpperArm,pointA:{x:utW/2-3,y:-utH/2+6},pointB:{x:0,y:-uaH/2},stiffness:stiff*0.7,damping:damp*1.5,length:1}),
                Constraint.create({bodyA:parts.leftUpperArm,bodyB:parts.leftLowerArm,pointA:{x:0,y:uaH/2},pointB:{x:0,y:-laH/2},stiffness:stiff*0.5,damping:damp*2,length:1}),
                Constraint.create({bodyA:parts.rightUpperArm,bodyB:parts.rightLowerArm,pointA:{x:0,y:uaH/2},pointB:{x:0,y:-laH/2},stiffness:stiff*0.5,damping:damp*2,length:1}),
                Constraint.create({bodyA:parts.lowerTorso,bodyB:parts.leftUpperLeg,pointA:{x:-ltW/3,y:ltH/2},pointB:{x:0,y:-ulH/2},stiffness:stiff*0.9,damping:damp,length:2}),
                Constraint.create({bodyA:parts.lowerTorso,bodyB:parts.rightUpperLeg,pointA:{x:ltW/3,y:ltH/2},pointB:{x:0,y:-ulH/2},stiffness:stiff*0.9,damping:damp,length:2}),
                Constraint.create({bodyA:parts.leftUpperLeg,bodyB:parts.leftLowerLeg,pointA:{x:0,y:ulH/2},pointB:{x:0,y:-llH/2},stiffness:stiff*0.6,damping:damp*1.8,length:1}),
                Constraint.create({bodyA:parts.rightUpperLeg,bodyB:parts.rightLowerLeg,pointA:{x:0,y:ulH/2},pointB:{x:0,y:-llH/2},stiffness:stiff*0.6,damping:damp*1.8,length:1})
            ];

            const allBodies = Object.values(parts);
            World.add(world, allBodies);
            constraints.forEach(c=>World.add(world,c));

            return {
                parts, constraints, color, allBodies,
                remove(){
                    constraints.forEach(c=>World.remove(world,c));
                    allBodies.forEach(b=>World.remove(world,b));
                }
            };
        }

        // ─── LOKAL SPILLER ───────────────────
        let localId=null, localColor=PLAYER_COLORS[0];
        const LOCAL_GROUP = -1;
        const sp = randomSpawn();
        let localRagdoll = createRagdoll(sp.x, sp.y, localColor, LOCAL_GROUP);

        // ─── INPUT STATE ─────────────────────
        const keys = {};
        let mouseX=GAME_WIDTH/2, mouseY=GAME_HEIGHT/2;
        let mouseGrabbing=false, grabJoint=null, grabBody=null, grabOffset={x:0,y:0};

        // NY: Attack system
        let attackCooldown = 0;
        let currentAttack = null; // {side:'left'|'right', time:performance.now(), dirX, dirY}
        const ATTACK_DURATION = 150; // ms
        const ATTACK_COOLDOWN = 350; // ms
        const ATTACK_DASH = 0.07; // dash impuls
        const ATTACK_KNOCKBACK = 15; // kraft på modstander
        const HITBOX_WIDTH = 40;
        const HITBOX_LENGTH = 80;

        window.addEventListener('keydown',e=>{
            keys[e.key.toLowerCase()]=true; keys[e.code]=true;
            if([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
        });
        window.addEventListener('keyup',e=>{
            keys[e.key.toLowerCase()]=false; keys[e.code]=false;
        });

        canvas.addEventListener('mousemove',e=>{
            const rect = canvas.getBoundingClientRect();
            const sx = GAME_WIDTH/rect.width, sy = GAME_HEIGHT/rect.height;
            mouseX = (e.clientX-rect.left)*sx;
            mouseY = (e.clientY-rect.top)*sy;
            if(mouseGrabbing && grabBody && grabJoint){
                Constraint.pointA(grabJoint, {x:mouseX+grabOffset.x, y:mouseY+grabOffset.y});
            }
        });

        canvas.addEventListener('mousedown',e=>{
            if(e.button===0){
                if(performance.now() > attackCooldown && !mouseGrabbing){
                    // Tjek om musen er tæt på egen krop for grab
                    const nearest = findNearestLocalBody(mouseX,mouseY,60);
                    if(nearest){
                        mouseGrabbing=true; grabBody=nearest;
                        grabOffset={x:nearest.position.x-mouseX, y:nearest.position.y-mouseY};
                        grabJoint = Constraint.create({
                            pointA:{x:mouseX+grabOffset.x, y:mouseY+grabOffset.y},
                            bodyB:grabBody, pointB:{x:0,y:0},
                            stiffness:0.8, damping:0.05, length:0
                        });
                        World.add(world,grabJoint);
                        canvas.style.cursor='grabbing';
                    } else {
                        // Start attack (venstre side)
                        triggerAttack('left');
                    }
                } else {
                    // Hvis cooling er færdig og ikke grabbing → attack
                    if(performance.now() > attackCooldown && !mouseGrabbing){
                        triggerAttack('left');
                    }
                }
            }
            if(e.button===2){
                if(performance.now() > attackCooldown && !mouseGrabbing){
                    triggerAttack('right');
                }
            }
        });

        canvas.addEventListener('mouseup',e=>{
            if(e.button===0){
                releaseGrab();
            }
        });
        canvas.addEventListener('contextmenu',e=>e.preventDefault());
        canvas.addEventListener('mouseleave',()=>{ releaseGrab(); });

        function releaseGrab(){
            if(grabJoint){ World.remove(world,grabJoint); grabJoint=null; }
            grabBody=null; mouseGrabbing=false; canvas.style.cursor='crosshair';
        }
        function findNearestLocalBody(mx,my,maxDist){
            if(!localRagdoll) return null;
            let nearest=null, best=maxDist;
            for(const b of localRagdoll.allBodies){
                const d = Math.hypot(b.position.x-mx, b.position.y-my);
                if(d<best){ best=d; nearest=b; }
            }
            return nearest;
        }

        function triggerAttack(side){
            const torso = localRagdoll.parts.upperTorso;
            const dx = mouseX - torso.position.x;
            const dy = mouseY - torso.position.y;
            const len = Math.hypot(dx,dy) || 1;
            const dirX = dx/len, dirY = dy/len;

            // Dash
            Body.applyForce(torso, torso.position, {x:dirX*ATTACK_DASH, y:dirY*ATTACK_DASH*0.5});

            // Opret hitbox
            currentAttack = {
                side,
                time: performance.now(),
                dirX, dirY,
                originX: torso.position.x,
                originY: torso.position.y
            };
            attackCooldown = performance.now() + ATTACK_COOLDOWN;

            // Tjek hits med remote spillere i denne frame (gøres i gameLoop)
            // Men vi gemmer blot hitboxen, og i gameLoop tjekker vi collision.
        }

        // ─── HOPDETEKTION ────────────────────
        let lastGroundContact = 0;
        Events.on(engine,'collisionStart',(event)=>{
            for(const pair of event.pairs){
                const a=pair.bodyA,b=pair.bodyB;
                const hasStatic = (a.isStatic&&(a.label==='platform'||a.label==='ground'||a.label==='wall')) ||
                                  (b.isStatic&&(b.label==='platform'||b.label==='ground'||b.label==='wall'));
                const hasLeg = (a.label&&a.label.includes('Leg')) || (b.label&&b.label.includes('Leg')) ||
                               (a.label==='lowerTorso') || (b.label==='lowerTorso');
                if(hasStatic && hasLeg) lastGroundContact = performance.now();
            }
        });
        function isGrounded(){ return (performance.now()-lastGroundContact) < 180; }

        // ─── AKTIV RAGDOLL (stand-up torque) ─
        function applyActiveRagdoll(){
            if(!localRagdoll) return;
            const torso = localRagdoll.parts.upperTorso;
            const head = localRagdoll.parts.head;

            // Torso upright torque
            const targetAngle = 0;
            let angleDiff = targetAngle - torso.angle;
            while(angleDiff>Math.PI) angleDiff-=Math.PI*2;
            while(angleDiff<-Math.PI) angleDiff+=Math.PI*2;
            Body.setAngularVelocity(torso, torso.angularVelocity*0.95 + angleDiff*0.01);

            // Head upright
            let hDiff = targetAngle - head.angle;
            while(hDiff>Math.PI) hDiff-=Math.PI*2;
            while(hDiff<-Math.PI) hDiff+=Math.PI*2;
            Body.setAngularVelocity(head, head.angularVelocity*0.92 + hDiff*0.008);

            // Ben pegende nedad (svag)
            ['leftUpperLeg','rightUpperLeg'].forEach(k=>{
                const leg = localRagdoll.parts[k];
                let lDiff = targetAngle - leg.angle;
                while(lDiff>Math.PI) lDiff-=Math.PI*2;
                while(lDiff<-Math.PI) lDiff+=Math.PI*2;
                Body.setAngularVelocity(leg, leg.angularVelocity*0.93 + lDiff*0.005);
            });
        }

        // ─── SPILLOOP ────────────────────────
        let lastNetSend=0, lastFrameTime=performance.now();
        function gameLoop(now){
            requestAnimationFrame(gameLoop);
            const dt = Math.min((now-lastFrameTime)/1000,0.1);
            lastFrameTime=now;

            if(localRagdoll){
                applyControls(dt);
                applyActiveRagdoll();
                processAttack(now);
            }
            Engine.update(engine,16.67);
            if(localRagdoll) checkRespawn();

            if(now - lastNetSend > NETWORK_INTERVAL){
                lastNetSend = now;
                sendNetworkUpdate();
            }
            updateRemoteInterpolation(now);
            render(now);
        }

        function applyControls(dt){
            const torso = localRagdoll.parts.upperTorso;
            const moveForce = 0.012; // reduceret hastighed

            if(keys['arrowleft']||keys['a']||keys['keya']) Body.applyForce(torso,torso.position,{x:-moveForce,y:0});
            if(keys['arrowright']||keys['d']||keys['keyd']) Body.applyForce(torso,torso.position,{x:moveForce,y:0});

            // Stærkere hop
            if((keys['arrowup']||keys['w']||keys['keyw']||keys[' ']||keys['space']) && isGrounded()){
                Body.applyForce(torso,torso.position,{x:0,y:-0.09});
                lastGroundContact = 0;
            }
        }

        function processAttack(now){
            if(!currentAttack) return;
            if(now - currentAttack.time > ATTACK_DURATION){
                currentAttack = null;
                return;
            }
            // Check collision med remote spillere
            const hitbox = getAttackHitbox(currentAttack);
            if(!hitbox) return;

            for(const [rid, rp] of remotePlayers){
                if(!rp.ragdollPartsData) continue;
                if(hitboxCollidesRemote(hitbox, rp.ragdollPartsData)){
                    // Send hit til server
                    const impulse = {
                        x: currentAttack.dirX * ATTACK_KNOCKBACK,
                        y: currentAttack.dirY * ATTACK_KNOCKBACK - 3
                    };
                    ws && ws.send(JSON.stringify({type:'hit',targetId:rid,impulse}));
                    // Fjern attack for at undgå multi-hit i samme frame (valgfrit)
                    currentAttack = null;
                    break;
                }
            }
        }

        function getAttackHitbox(attack){
            // Placer hitbox foran spilleren i angrebsretning
            const centerX = attack.originX + attack.dirX * (HITBOX_LENGTH/2 + 20);
            const centerY = attack.originY + attack.dirY * (HITBOX_LENGTH/2 + 20);
            const angle = Math.atan2(attack.dirY, attack.dirX);
            return { x:centerX, y:centerY, w:HITBOX_WIDTH, h:HITBOX_LENGTH, angle };
        }

        function hitboxCollidesRemote(hitbox, partsData){
            // Tjek hoved og torso for remote spiller (nok)
            const checkParts = ['head','upperTorso','lowerTorso'];
            for(const key of checkParts){
                const p = partsData[key];
                if(!p) continue;
                let radius = key==='head'? 17 : (key==='upperTorso'? 22 : 19);
                if(rectCircleCollision(hitbox, p.x, p.y, radius)){
                    return true;
                }
            }
            return false;
        }

        function rectCircleCollision(rect, cx, cy, r){
            // Rotate point into rect's local space
            const cos = Math.cos(-rect.angle), sin = Math.sin(-rect.angle);
            const dx = cx - rect.x, dy = cy - rect.y;
            const localX = dx*cos - dy*sin;
            const localY = dx*sin + dy*cos;

            const halfW = rect.w/2, halfH = rect.h/2;
            const closestX = Math.max(-halfW, Math.min(halfW, localX));
            const closestY = Math.max(-halfH, Math.min(halfH, localY));
            const distX = localX - closestX, distY = localY - closestY;
            return (distX*distX + distY*distY) < r*r;
        }

        function checkRespawn(){
            const head = localRagdoll.parts.head;
            if(head.position.y > RESPAWN_Y){
                respawnLocal();
            }
        }
        function respawnLocal(){
            releaseGrab();
            localRagdoll.remove();
            const sp = randomSpawn();
            localRagdoll = createRagdoll(sp.x, sp.y, localColor, LOCAL_GROUP);
            lastGroundContact = 0;
            currentAttack = null;
        }

        // ─── NETVÆRK ──────────────────────────
        let ws=null, connected=false;
        const remotePlayers = new Map();

        function connectWS(){
            const proto = location.protocol==='https:'?'wss:':'ws:';
            const url = `${proto}//${location.host}`;
            try{ ws = new WebSocket(url); }catch(e){ setConnected(false); setTimeout(connectWS,3000); return; }
            ws.onopen = ()=>{ console.log('connected'); setConnected(true); };
            ws.onmessage = (e)=>{
                const msg = JSON.parse(e.data);
                if(msg.type==='init'){ localId=msg.id; localColor=msg.color; if(localRagdoll) localRagdoll.color=localColor; updatePlayerCount(); }
                else if(msg.type==='playerJoined' && msg.id!==localId){ remotePlayers.set(msg.id,{color:msg.color,states:[],lastUpdate:performance.now(),ragdollPartsData:null}); updatePlayerCount(); }
                else if(msg.type==='playerLeft'){ remotePlayers.delete(msg.id); updatePlayerCount(); }
                else if(msg.type==='playerUpdate' && msg.id!==localId){
                    const rp = remotePlayers.get(msg.id);
                    if(rp){
                        rp.states.push({timestamp:performance.now(), parts:msg.parts});
                        if(rp.states.length>3) rp.states.shift();
                        rp.lastUpdate = performance.now();
                    }
                }
                else if(msg.type==='hit' && msg.targetId===localId){
                    applyKnockback(msg.impulse);
                }
            };
            ws.onclose = ()=>{ setConnected(false); remotePlayers.clear(); updatePlayerCount(); setTimeout(connectWS,2000); };
            ws.onerror = ()=> ws.close();
        }
        function setConnected(s){
            connected=s;
            statusBadge.textContent = s?'● Forbundet':'● Afbrudt';
            statusBadge.className = s?'connected':'disconnected';
        }
        function updatePlayerCount(){ playerCountEl.textContent = `Spillere: ${1+remotePlayers.size}`; }
        function applyKnockback(imp){
            if(!localRagdoll) return;
            const t = localRagdoll.parts.upperTorso;
            Body.applyForce(t,t.position,{x:imp.x*0.15, y:imp.y*0.15});
            for(const b of localRagdoll.allBodies) Body.setVelocity(b,{x:b.velocity.x+imp.x*0.05, y:b.velocity.y+imp.y*0.05});
        }

        function sendNetworkUpdate(){
            if(!connected||!ws||ws.readyState!==1||!localRagdoll) return;
            const parts = {};
            for(const [k,v] of Object.entries(localRagdoll.parts)){
                parts[k] = {x:v.position.x, y:v.position.y, a:v.angle, vx:v.velocity.x, vy:v.velocity.y, va:v.angularVelocity};
            }
            ws.send(JSON.stringify({type:'update',parts}));
        }

        function updateRemoteInterpolation(now){
            for(const [id,rp] of remotePlayers){
                if(rp.states.length>=2){
                    let s0=rp.states[0], s1=rp.states[rp.states.length-1];
                    for(let i=0;i<rp.states.length-1;i++){
                        if(rp.states[i+1].timestamp>=now){ s0=rp.states[i]; s1=rp.states[i+1]; break; }
                    }
                    const tDiff = s1.timestamp-s0.timestamp;
                    let alpha = tDiff>0? Math.max(0,Math.min(1,(now-s0.timestamp)/tDiff)) : 0;
                    const interp = {};
                    for(const key of Object.keys(s1.parts)){
                        const p0=s0.parts[key], p1=s1.parts[key];
                        if(p0&&p1){
                            let a0=p0.a, a1=p1.a, diff=a1-a0;
                            while(diff>Math.PI) diff-=Math.PI*2;
                            while(diff<-Math.PI) diff+=Math.PI*2;
                            interp[key] = {x:p0.x+(p1.x-p0.x)*alpha, y:p0.y+(p1.y-p0.y)*alpha, a:a0+diff*alpha};
                        }else if(p1) interp[key]={...p1};
                    }
                    rp.ragdollPartsData = interp;
                }else if(rp.states.length===1){
                    rp.ragdollPartsData = rp.states[0].parts;
                }
            }
        }

        // Rens timed-out spillere
        setInterval(()=>{
            const now = performance.now();
            for(const [id,rp] of remotePlayers) if(now-rp.lastUpdate>8000){ remotePlayers.delete(id); updatePlayerCount(); }
        },3000);

        // ─── RENDERING ────────────────────────
        function render(now){
            ctx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
            // baggrund
            const grad = ctx.createLinearGradient(0,0,0,GAME_HEIGHT);
            grad.addColorStop(0,'#1a2a3d'); grad.addColorStop(0.5,'#1e2e42'); grad.addColorStop(1,'#15202b');
            ctx.fillStyle=grad; ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
            // gitter
            ctx.strokeStyle='rgba(255,255,255,0.02)'; ctx.lineWidth=1;
            for(let x=60;x<GAME_WIDTH;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GAME_HEIGHT);ctx.stroke();}
            for(let y=60;y<GAME_HEIGHT;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GAME_WIDTH,y);ctx.stroke();}
            // platforme
            for(const p of platforms){
                const v=p.vertices;
                ctx.fillStyle='#3d5068'; ctx.strokeStyle='#546e8a'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(v[0].x,v[0].y);
                for(let i=1;i<v.length;i++) ctx.lineTo(v[i].x,v[i].y);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                const topY = Math.min(...v.map(ve=>ve.y));
                ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(Math.min(...v.map(ve=>ve.x)),topY); ctx.lineTo(Math.max(...v.map(ve=>ve.x)),topY); ctx.stroke();
            }
            ctx.fillStyle='#2c3d50'; ctx.fillRect(0,GROUND_Y,GAME_WIDTH,GROUND_THICK);
            ctx.fillStyle='#3d5068'; ctx.fillRect(0,GROUND_Y,GAME_WIDTH,6);
            // remote spillere
            for(const [id,rp] of remotePlayers){
                if(rp.ragdollPartsData){
                    renderRagdollFromData(rp.ragdollPartsData, rp.color, 0.65);
                    const h=rp.ragdollPartsData.head;
                    if(h){ ctx.fillStyle=rp.color; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(id.replace('player_','Spiller '),h.x,h.y-28); }
                }
            }
            // lokal spiller
            if(localRagdoll){
                renderRagdollBodies(localRagdoll, localColor, 1.0);
                const h=localRagdoll.parts.head.position;
                ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText('DIG',h.x,h.y-28);
                ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(h.x,h.y,30,0,Math.PI*2); ctx.stroke();
            }
            // attack hitbox visual
            if(currentAttack){
                const hitbox = getAttackHitbox(currentAttack);
                ctx.save(); ctx.globalAlpha=0.5;
                ctx.fillStyle='rgba(255,50,50,0.4)'; ctx.strokeStyle='#ff3333'; ctx.lineWidth=3;
                ctx.translate(hitbox.x, hitbox.y); ctx.rotate(hitbox.angle);
                ctx.fillRect(-hitbox.w/2, -hitbox.h/2, hitbox.w, hitbox.h);
                ctx.strokeRect(-hitbox.w/2, -hitbox.h/2, hitbox.w, hitbox.h);
                ctx.restore();
            }
            // dødszone
            const dGrad=ctx.createLinearGradient(0,RESPAWN_Y-30,0,RESPAWN_Y+20);
            dGrad.addColorStop(0,'rgba(231,76,60,0)'); dGrad.addColorStop(0.5,'rgba(231,76,60,0.15)'); dGrad.addColorStop(1,'rgba(231,76,60,0.4)');
            ctx.fillStyle=dGrad; ctx.fillRect(0,RESPAWN_Y-30,GAME_WIDTH,60);
            ctx.strokeStyle='rgba(231,76,60,0.5)'; ctx.lineWidth=2; ctx.setLineDash([10,20]);
            ctx.beginPath(); ctx.moveTo(0,RESPAWN_Y); ctx.lineTo(GAME_WIDTH,RESPAWN_Y); ctx.stroke(); ctx.setLineDash([]);
        }

        function renderRagdollFromData(parts,color,alpha){
            const order=['leftLowerLeg','rightLowerLeg','leftUpperLeg','rightUpperLeg','lowerTorso','leftLowerArm','rightLowerArm','leftUpperArm','rightUpperArm','upperTorso','head'];
            const dims={head:{t:'circle',r:17},upperTorso:{t:'rect',w:28,h:38},lowerTorso:{t:'rect',w:24,h:34},
                leftUpperArm:{t:'rect',w:11,h:28},rightUpperArm:{t:'rect',w:11,h:28},
                leftLowerArm:{t:'rect',w:9,h:26},rightLowerArm:{t:'rect',w:9,h:26},
                leftUpperLeg:{t:'rect',w:13,h:34},rightUpperLeg:{t:'rect',w:13,h:34},
                leftLowerLeg:{t:'rect',w:11,h:30},rightLowerLeg:{t:'rect',w:11,h:30}};
            const dark = darken(color,0.7), light = lighten(color,0.25);
            for(const key of order){
                const d=parts[key], dim=dimkey; if(!d||!dim) continue;
                ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y); ctx.rotate(d.a);
                if(dim.t==='circle'){
                    const g=ctx.createRadialGradient(-3,-4,dim.r*0.2,0,0,dim.r);
                    g.addColorStop(0,light); g.addColorStop(1,dark);
                    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,dim.r,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
                    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,-3,5,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5,-3,5,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-4,-3,2.2,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6,-3,2.2,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,4,6,0.1,Math.PI-0.1); ctx.stroke();
                }else{
                    const g=ctx.createLinearGradient(-dim.w/2,0,dim.w/2,0);
                    g.addColorStop(0,dark); g.addColorStop(0.5,color); g.addColorStop(1,dark);
                    ctx.fillStyle=g; ctx.fillRect(-dim.w/2,-dim.h/2,dim.w,dim.h);
                    ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=2; ctx.strokeRect(-dim.w/2,-dim.h/2,dim.w,dim.h);
                    ctx.fillStyle=light; ctx.beginPath(); ctx.arc(-dim.w/2+3,-dim.h/2+3,3,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(dim.w/2-3,-dim.h/2+3,3,0,Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }
        function renderRagdollBodies(ragdoll,color,alpha){
            const data={}; for(const[k,v]of Object.entries(ragdoll.parts)) data[k]={x:v.position.x,y:v.position.y,a:v.angle};
            renderRagdollFromData(data,color,alpha);
        }
        function darken(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}
        function lighten(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,Math.round(r+(255-r)*f))},${Math.min(255,Math.round(g+(255-g)*f))},${Math.min(255,Math.round(b+(255-b)*f))})`;}

        // ─── START ────────────────────────────
        connectWS();
        requestAnimationFrame(gameLoop);
        console.log('🎮 Ragdoll Fight – aktiv ragdoll, hop, dash & rød hitbox');
    })();
    </script>

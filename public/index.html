<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragdoll Fight - Multiplayer</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #e94560;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
            max-height: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(233, 68, 96, 0.15), 0 0 120px rgba(0, 0, 0, 0.5);
            background: #1e2a3a;
            cursor: crosshair;
            max-width: 100%;
            max-height: 100%;
            image-rendering: auto;
        }

        #uiOverlay {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        #statusBadge {
            background: var(--surface);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        #statusBadge.connected {
            border-color: #2ecc71;
            color: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }
        #statusBadge.disconnected {
            border-color: #e74c3c;
            color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.2);
        }

        #playerCount {
            background: var(--surface);
            color: #f39c12;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(243, 156, 18, 0.4);
            backdrop-filter: blur(10px);
        }

        #controlsHint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 33, 62, 0.85);
            color: #aaa;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: 0.4px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            line-height: 1.6;
        }
        #controlsHint span {
            color: #e94560;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiOverlay">
            <div id="statusBadge" class="disconnected">● Forbinder...</div>
            <div id="playerCount">Spillere: 1</div>
        </div>
        <div id="controlsHint">
            <span>WASD / Piletaster</span> = Bevæg · <span>Mellemrum</span> = Hop ·
            <span>Venstre klik</span> = Slå venstre · <span>Højre klik</span> = Slå højre ·
            <span>Cooldown</span> på slag
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js">
    </script>
    <script>
        (function() {
            // ─────────────────────────────────────
            // KONFIGURATION
            // ─────────────────────────────────────
            const GAME_WIDTH = 1200;
            const GAME_HEIGHT = 700;
            const NETWORK_UPDATE_RATE = 30;
            const NETWORK_INTERVAL = 1000 / NETWORK_UPDATE_RATE;
            const RESPAWN_Y_THRESHOLD = 780;
            const GROUND_Y = 640;
            const GROUND_THICKNESS = 80;
            const SWING_COOLDOWN_MS = 350;

            const PLAYER_COLORS = [
                '#4A90D9', '#E74C3C', '#2ECC71', '#F39C12',
                '#9B59B6', '#1ABC9C', '#E67E22', '#3498DB',
                '#E91E63', '#00BCD4', '#FF5722', '#8BC34A'
            ];

            // ─────────────────────────────────────
            // DOM ELEMENTER
            // ─────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const statusBadge = document.getElementById('statusBadge');
            const playerCountEl = document.getElementById('playerCount');

            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;

            // ─────────────────────────────────────
            // MATTER.JS OPSÆTNING
            // ─────────────────────────────────────
            const { Engine, World, Bodies, Body, Constraint, Events } = Matter;

            const engine = Engine.create();
            engine.gravity.y = 1.2;
            engine.gravity.x = 0;
            const world = engine.world;

            // ─────────────────────────────────────
            // PLATFORME
            // ─────────────────────────────────────
            const platforms = [];

            function createPlatform(x, y, w, h) {
                const plat = Bodies.rectangle(x, y, w, h, {
                    isStatic: true,
                    friction: 0.9,
                    restitution: 0.1,
                    label: 'platform',
                });
                platforms.push(plat);
                return plat;
            }

            const ground = createPlatform(GAME_WIDTH / 2, GROUND_Y + GROUND_THICKNESS / 2, GAME_WIDTH, GROUND_THICKNESS);
            const leftWall = Bodies.rectangle(-30, GAME_HEIGHT / 2, 60, GAME_HEIGHT * 2, { isStatic: true, friction: 0.3, restitution: 0.2, label: 'wall' });
            const rightWall = Bodies.rectangle(GAME_WIDTH + 30, GAME_HEIGHT / 2, 60, GAME_HEIGHT * 2, { isStatic: true, friction: 0.3, restitution: 0.2, label: 'wall' });
            const ceiling = Bodies.rectangle(GAME_WIDTH / 2, -30, GAME_WIDTH, 60, { isStatic: true, friction: 0.3, restitution: 0.3, label: 'wall' });

            const plat1 = createPlatform(280, 470, 190, 18);
            const plat2 = createPlatform(680, 410, 170, 18);
            const plat3 = createPlatform(500, 290, 150, 18);
            const plat4 = createPlatform(880, 340, 200, 18);
            const plat5 = createPlatform(150, 300, 130, 18);
            const plat6 = createPlatform(1000, 500, 140, 18);

            World.add(world, [ground, leftWall, rightWall, ceiling, plat1, plat2, plat3, plat4, plat5, plat6]);

            // ─────────────────────────────────────
            // SPAWN PUNKTER
            // ─────────────────────────────────────
            const spawnPoints = [
                { x: 350, y: 160 }, { x: 600, y: 140 }, { x: 850, y: 160 },
                { x: 200, y: 200 }, { x: 1000, y: 200 }, { x: 500, y: 120 }, { x: 700, y: 130 },
            ];

            function getRandomSpawn() {
                return spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
            }

            // ─────────────────────────────────────
            // RAGDOLL BYGGER
            // ─────────────────────────────────────
            function createRagdoll(spawnX, spawnY, color, collisionGroup, isLocal) {
                const parts = {};
                const constraints = [];

                const headRadius = 17;
                const upperTorsoW = 28;
                const upperTorsoH = 38;
                const lowerTorsoW = 24;
                const lowerTorsoH = 34;
                const upperArmW = 11;
                const upperArmH = 28;
                const lowerArmW = 9;
                const lowerArmH = 26;
                const upperLegW = 13;
                const upperLegH = 34;
                const lowerLegW = 11;
                const lowerLegH = 30;

                const headY = spawnY;
                const upperTorsoY = headY + headRadius + upperTorsoH / 2;
                const lowerTorsoY = upperTorsoY + upperTorsoH / 2 + lowerTorsoH / 2;
                const shoulderY = headY + headRadius + 4;

                // Vigtigt: remote kroppe har restitution=0 for at undgå voldsomme bounce
                const bodyOptions = isLocal ? {
                    restitution: 0.2,
                    friction: 0.5,
                    collisionFilter: { group: collisionGroup },
                    isStatic: false,
                } : {
                    restitution: 0,
                    friction: 0.2,
                    collisionFilter: { group: collisionGroup },
                    isStatic: true,
                };

                parts.head = Bodies.circle(spawnX, headY, headRadius, { ...bodyOptions, label: 'head', density: isLocal ? 0.002 : 0.001 });
                parts.upperTorso = Bodies.rectangle(spawnX, upperTorsoY, upperTorsoW, upperTorsoH, { ...bodyOptions, label: 'upperTorso', density: isLocal ? 0.003 : 0.001 });
                parts.lowerTorso = Bodies.rectangle(spawnX, lowerTorsoY, lowerTorsoW, lowerTorsoH, { ...bodyOptions, label: 'lowerTorso', density: isLocal ? 0.0025 : 0.001 });

                const armOffsetX = upperTorsoW / 2 + upperArmW / 2 - 1;
                parts.leftUpperArm = Bodies.rectangle(spawnX - armOffsetX, shoulderY + upperArmH / 2, upperArmW, upperArmH, { ...bodyOptions, label: 'leftUpperArm', density: isLocal ? 0.0015 : 0.001 });
                parts.rightUpperArm = Bodies.rectangle(spawnX + armOffsetX, shoulderY + upperArmH / 2, upperArmW, upperArmH, { ...bodyOptions, label: 'rightUpperArm', density: isLocal ? 0.0015 : 0.001 });

                const lowerArmTopY = shoulderY + upperArmH;
                parts.leftLowerArm = Bodies.rectangle(spawnX - armOffsetX, lowerArmTopY + lowerArmH / 2, lowerArmW, lowerArmH, { ...bodyOptions, label: 'leftLowerArm', density: isLocal ? 0.0012 : 0.001 });
                parts.rightLowerArm = Bodies.rectangle(spawnX + armOffsetX, lowerArmTopY + lowerArmH / 2, lowerArmW, lowerArmH, { ...bodyOptions, label: 'rightLowerArm', density: isLocal ? 0.0012 : 0.001 });

                const legOffsetX = lowerTorsoW / 3;
                const upperLegTopY = lowerTorsoY + lowerTorsoH / 2;
                parts.leftUpperLeg = Bodies.rectangle(spawnX - legOffsetX, upperLegTopY + upperLegH / 2, upperLegW, upperLegH, { ...bodyOptions, label: 'leftUpperLeg', density: isLocal ? 0.002 : 0.001 });
                parts.rightUpperLeg = Bodies.rectangle(spawnX + legOffsetX, upperLegTopY + upperLegH / 2, upperLegW, upperLegH, { ...bodyOptions, label: 'rightUpperLeg', density: isLocal ? 0.002 : 0.001 });

                const lowerLegTopY = upperLegTopY + upperLegH;
                parts.leftLowerLeg = Bodies.rectangle(spawnX - legOffsetX, lowerLegTopY + lowerLegH / 2, lowerLegW, lowerLegH, { ...bodyOptions, label: 'leftLowerLeg', density: isLocal ? 0.0018 : 0.001 });
                parts.rightLowerLeg = Bodies.rectangle(spawnX + legOffsetX, lowerLegTopY + lowerLegH / 2, lowerLegW, lowerLegH, { ...bodyOptions, label: 'rightLowerLeg', density: isLocal ? 0.0018 : 0.001 });

                if (isLocal) {
                    const stiff = 0.6;
                    const damp = 0.08;
                    constraints.push(Constraint.create({
                        bodyA: parts.head, bodyB: parts.upperTorso,
                        pointA: { x: 0, y: headRadius }, pointB: { x: 0, y: -upperTorsoH / 2 },
                        stiffness: stiff, damping: damp, length: 2,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.upperTorso, bodyB: parts.lowerTorso,
                        pointA: { x: 0, y: upperTorsoH / 2 }, pointB: { x: 0, y: -lowerTorsoH / 2 },
                        stiffness: stiff * 1.2, damping: damp, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.upperTorso, bodyB: parts.leftUpperArm,
                        pointA: { x: -upperTorsoW / 2 + 3, y: -upperTorsoH / 2 + 6 }, pointB: { x: 0, y: -upperArmH / 2 },
                        stiffness: stiff * 0.7, damping: damp * 1.5, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.upperTorso, bodyB: parts.rightUpperArm,
                        pointA: { x: upperTorsoW / 2 - 3, y: -upperTorsoH / 2 + 6 }, pointB: { x: 0, y: -upperArmH / 2 },
                        stiffness: stiff * 0.7, damping: damp * 1.5, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.leftUpperArm, bodyB: parts.leftLowerArm,
                        pointA: { x: 0, y: upperArmH / 2 }, pointB: { x: 0, y: -lowerArmH / 2 },
                        stiffness: stiff * 0.5, damping: damp * 2, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.rightUpperArm, bodyB: parts.rightLowerArm,
                        pointA: { x: 0, y: upperArmH / 2 }, pointB: { x: 0, y: -lowerArmH / 2 },
                        stiffness: stiff * 0.5, damping: damp * 2, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.lowerTorso, bodyB: parts.leftUpperLeg,
                        pointA: { x: -lowerTorsoW / 3, y: lowerTorsoH / 2 }, pointB: { x: 0, y: -upperLegH / 2 },
                        stiffness: stiff * 0.9, damping: damp, length: 2,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.lowerTorso, bodyB: parts.rightUpperLeg,
                        pointA: { x: lowerTorsoW / 3, y: lowerTorsoH / 2 }, pointB: { x: 0, y: -upperLegH / 2 },
                        stiffness: stiff * 0.9, damping: damp, length: 2,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.leftUpperLeg, bodyB: parts.leftLowerLeg,
                        pointA: { x: 0, y: upperLegH / 2 }, pointB: { x: 0, y: -lowerLegH / 2 },
                        stiffness: stiff * 0.6, damping: damp * 1.8, length: 1,
                    }));
                    constraints.push(Constraint.create({
                        bodyA: parts.rightUpperLeg, bodyB: parts.rightLowerLeg,
                        pointA: { x: 0, y: upperLegH / 2 }, pointB: { x: 0, y: -lowerLegH / 2 },
                        stiffness: stiff * 0.6, damping: damp * 1.8, length: 1,
                    }));
                }

                const allBodies = Object.values(parts);
                World.add(world, allBodies);
                constraints.forEach(c => World.add(world, c));

                return {
                    parts,
                    constraints,
                    color,
                    allBodies,
                    remove() {
                        constraints.forEach(c => World.remove(world, c));
                        allBodies.forEach(b => World.remove(world, b));
                    },
                };
            }

            // ─────────────────────────────────────
            // LOKAL SPILLER
            // ─────────────────────────────────────
            let localPlayerId = null;
            let localColor = PLAYER_COLORS[0];
            const LOCAL_COLLISION_GROUP = -1;

            const spawn = getRandomSpawn();
            let localRagdoll = createRagdoll(spawn.x, spawn.y, localColor, LOCAL_COLLISION_GROUP, true);

            // ─────────────────────────────────────
            // INPUT & COOLDOWN
            // ─────────────────────────────────────
            const keys = {};
            let mouseX = GAME_WIDTH / 2;
            let mouseY = GAME_HEIGHT / 2;
            let leftSwingCooldown = 0;
            let rightSwingCooldown = 0;

            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                keys[e.code] = true;
                if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
            });
            window.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
                keys[e.code] = false;
            });

            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = GAME_WIDTH / rect.width;
                const scaleY = GAME_HEIGHT / rect.height;
                mouseX = (e.clientX - rect.left) * scaleX;
                mouseY = (e.clientY - rect.top) * scaleY;
            });

            canvas.addEventListener('mousedown', e => {
                const now = performance.now();
                if (e.button === 0) {
                    if (now >= leftSwingCooldown && localRagdoll) {
                        performLeftSwing();
                        leftSwingCooldown = now + SWING_COOLDOWN_MS;
                    }
                } else if (e.button === 2) {
                    if (now >= rightSwingCooldown && localRagdoll) {
                        performRightSwing();
                        rightSwingCooldown = now + SWING_COOLDOWN_MS;
                    }
                }
            });

            canvas.addEventListener('contextmenu', e => e.preventDefault());

            function performLeftSwing() {
                if (!localRagdoll) return;
                const swingForce = 1.25;
                const dashForce = 0.25;   // sat ned præcis som ønsket
                const torso = localRagdoll.parts.upperTorso;
                burstSwing(localRagdoll.parts.leftUpperArm, localRagdoll.parts.leftLowerArm, mouseX, mouseY, swingForce);
                const dx = mouseX - torso.position.x;
                const dy = mouseY - torso.position.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                Body.applyForce(torso, torso.position, { x: (dx / len) * dashForce, y: (dy / len) * dashForce * 0.5 });
            }

            function performRightSwing() {
                if (!localRagdoll) return;
                const swingForce = 1.25;
                const dashForce = 0.25;
                const torso = localRagdoll.parts.upperTorso;
                burstSwing(localRagdoll.parts.rightUpperArm, localRagdoll.parts.rightLowerArm, mouseX, mouseY, swingForce);
                const dx = mouseX - torso.position.x;
                const dy = mouseY - torso.position.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                Body.applyForce(torso, torso.position, { x: (dx / len) * dashForce, y: (dy / len) * dashForce * 0.5 });
            }

            function burstSwing(upperArm, lowerArm, targetX, targetY, force) {
                const shoulderPos = upperArm.position;
                const angleToTarget = Math.atan2(targetY - shoulderPos.y, targetX - shoulderPos.x);
                const currentAngle = upperArm.angle;
                let angleDiff = angleToTarget - currentAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const swingDir = Math.sign(angleDiff);
                const magnitude = Math.min(Math.abs(angleDiff) * 1.5, 1.5);
                Body.setAngularVelocity(upperArm, upperArm.angularVelocity + swingDir * force * magnitude);
                Body.setAngularVelocity(lowerArm, lowerArm.angularVelocity + swingDir * force * magnitude * 0.8);
            }

            // ─────────────────────────────────────
            // HOP DETEKTION
            // ─────────────────────────────────────
            let lastGroundContact = 0;
            Events.on(engine, 'collisionStart', (event) => {
                for (const pair of event.pairs) {
                    const bodies = [pair.bodyA, pair.bodyB];
                    const hasStatic = bodies.some(b => b.isStatic && (b.label === 'platform' || b.label === 'ground' || b.label === 'wall'));
                    const hasLeg = bodies.some(b =>
                        b.label === 'leftLowerLeg' || b.label === 'rightLowerLeg' ||
                        b.label === 'leftUpperLeg' || b.label === 'rightUpperLeg' ||
                        b.label === 'lowerTorso' || b.label === 'upperTorso' || b.label === 'head'
                    );
                    if (hasStatic && hasLeg) {
                        lastGroundContact = performance.now();
                    }
                }
            });

            function isGrounded() {
                return (performance.now() - lastGroundContact) < 280;
            }

            // ─────────────────────────────────────
            // SPIL LOOP
            // ─────────────────────────────────────
            let lastNetworkSend = 0;
            let lastFrameTime = performance.now();

            function gameLoop(timestamp) {
                requestAnimationFrame(gameLoop);
                const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.1);
                lastFrameTime = timestamp;

                if (localRagdoll) applyLocalControls(dt);
                Engine.update(engine, 16.67);
                if (localRagdoll) checkRespawn();
                updateRemoteBodies();

                if (timestamp - lastNetworkSend > NETWORK_INTERVAL) {
                    lastNetworkSend = timestamp;
                    sendNetworkUpdate();
                }

                updateRemoteInterpolation(timestamp);
                render(timestamp);
            }

            function applyLocalControls(dt) {
                const moveForce = 0.018;
                const jumpForce = 0.08;
                const torso = localRagdoll.parts.upperTorso;

                if (keys['arrowleft'] || keys['a'] || keys['keya']) Body.applyForce(torso, torso.position, { x: -moveForce, y: 0 });
                if (keys['arrowright'] || keys['d'] || keys['keyd']) Body.applyForce(torso, torso.position, { x: moveForce, y: 0 });
                if ((keys['arrowup'] || keys['w'] || keys['keyw'] || keys[' '] || keys['space']) && isGrounded()) {
                    Body.applyForce(torso, torso.position, { x: 0, y: -jumpForce });
                    lastGroundContact = 0;
                }

                // Aktiv ragdoll – stærk oprejsning (0.3)
                const uprightTorque = 0.3;
                const torsoAngle = torso.angle;
                let diff = 0 - torsoAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                Body.setAngularVelocity(torso, torso.angularVelocity + diff * uprightTorque);

                const lowerTorso = localRagdoll.parts.lowerTorso;
                let lowerDiff = 0 - lowerTorso.angle;
                while (lowerDiff > Math.PI) lowerDiff -= Math.PI * 2;
                while (lowerDiff < -Math.PI) lowerDiff += Math.PI * 2;
                Body.setAngularVelocity(lowerTorso, lowerTorso.angularVelocity + lowerDiff * uprightTorque * 0.7);

                // Ben stabilisator – holder benene under kroppen
                const legTorque = 0.35;
                for (const legPart of [
                    localRagdoll.parts.leftUpperLeg, localRagdoll.parts.leftLowerLeg,
                    localRagdoll.parts.rightUpperLeg, localRagdoll.parts.rightLowerLeg,
                ]) {
                    let legDiff = 0 - legPart.angle;
                    while (legDiff > Math.PI) legDiff -= Math.PI * 2;
                    while (legDiff < -Math.PI) legDiff += Math.PI * 2;
                    Body.setAngularVelocity(legPart, legPart.angularVelocity + legDiff * legTorque);
                }

                // Dæmp arme
                const armDamping = 0.94;
                [
                    localRagdoll.parts.leftUpperArm, localRagdoll.parts.rightUpperArm,
                    localRagdoll.parts.leftLowerArm, localRagdoll.parts.rightLowerArm,
                ].forEach(arm => Body.setAngularVelocity(arm, arm.angularVelocity * armDamping));
            }

            function checkRespawn() {
                const head = localRagdoll.parts.head;
                const torso = localRagdoll.parts.upperTorso;
                if (head.position.y > RESPAWN_Y_THRESHOLD || torso.position.y > RESPAWN_Y_THRESHOLD) respawnLocalPlayer();
            }

            function respawnLocalPlayer() {
                localRagdoll.remove();
                const sp = getRandomSpawn();
                localRagdoll = createRagdoll(sp.x, sp.y, localColor, LOCAL_COLLISION_GROUP, true);
                lastGroundContact = 0;
                leftSwingCooldown = 0;
                rightSwingCooldown = 0;
            }

            // ─────────────────────────────────────
            // REMOTE SPILLERE (statiske, restitution=0)
            // ─────────────────────────────────────
            const remoteRagdolls = new Map();

            function updateRemoteBodies() {
                for (const [id, rp] of remotePlayers) {
                    if (!rp.ragdollPartsData) continue;
                    let ragdoll = remoteRagdolls.get(id);
                    if (!ragdoll) {
                        ragdoll = createRagdoll(0, 0, rp.color, LOCAL_COLLISION_GROUP + 100 + Math.floor(Math.random() * 1000), false);
                        remoteRagdolls.set(id, ragdoll);
                    }
                    const partsData = rp.ragdollPartsData;
                    for (const [key, body] of Object.entries(ragdoll.parts)) {
                        const data = partsData[key];
                        if (data) {
                            Body.setPosition(body, { x: data.x, y: data.y });
                            Body.setAngle(body, data.a);
                            Body.setVelocity(body, { x: 0, y: 0 });
                            Body.setAngularVelocity(body, 0);
                        }
                    }
                }
                for (const [id, ragdoll] of remoteRagdolls) {
                    if (!remotePlayers.has(id)) {
                        ragdoll.remove();
                        remoteRagdolls.delete(id);
                    }
                }
            }

            // ─────────────────────────────────────
            // NETVÆRK
            // ─────────────────────────────────────
            let ws = null;
            let connected = false;
            const remotePlayers = new Map();

            function connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                try { ws = new WebSocket(wsUrl); } catch (e) {
                    console.error(e); setConnectionStatus(false); setTimeout(connectWebSocket, 3000); return;
                }
                ws.onopen = () => { console.log('Forbundet'); setConnectionStatus(true); };
                ws.onmessage = (event) => { handleServerMessage(JSON.parse(event.data)); };
                ws.onclose = () => {
                    console.log('Forbindelse mistet'); setConnectionStatus(false);
                    remotePlayers.clear();
                    for (const ragdoll of remoteRagdolls.values()) ragdoll.remove();
                    remoteRagdolls.clear();
                    setTimeout(connectWebSocket, 2000);
                };
                ws.onerror = (err) => { console.error(err); ws.close(); };
            }

            function setConnectionStatus(status) {
                connected = status;
                statusBadge.textContent = status ? '● Forbundet' : '● Afbrudt';
                statusBadge.className = status ? 'connected' : 'disconnected';
                updatePlayerCount();
            }

            function updatePlayerCount() {
                playerCountEl.textContent = `Spillere: ${1 + remotePlayers.size}`;
            }

            function handleServerMessage(msg) {
                switch (msg.type) {
                    case 'init':
                        localPlayerId = msg.id; localColor = msg.color;
                        if (localRagdoll) localRagdoll.color = localColor;
                        updatePlayerCount(); break;
                    case 'playerJoined':
                        if (msg.id !== localPlayerId) {
                            remotePlayers.set(msg.id, { color: msg.color, states: [], lastUpdate: performance.now(), ragdollPartsData: null });
                            updatePlayerCount();
                        } break;
                    case 'playerLeft':
                        remotePlayers.delete(msg.id);
                        const r = remoteRagdolls.get(msg.id);
                        if (r) { r.remove(); remoteRagdolls.delete(msg.id); }
                        updatePlayerCount(); break;
                    case 'playerUpdate':
                        if (msg.id !== localPlayerId && remotePlayers.has(msg.id)) {
                            const rp = remotePlayers.get(msg.id);
                            rp.states.push({ timestamp: performance.now(), parts: msg.parts });
                            if (rp.states.length > 3) rp.states.shift();
                            rp.lastUpdate = performance.now();
                        } break;
                    case 'hit':
                        if (msg.targetId === localPlayerId && localRagdoll) applyKnockback(msg.impulse);
                        break;
                }
            }

            function applyKnockback(impulse) {
                if (!localRagdoll) return;
                const scale = 0.3; // kraftigt reduceret for at undgå voldsomme bevægelser
                const torso = localRagdoll.parts.upperTorso;
                Body.applyForce(torso, torso.position, { x: impulse.x * scale, y: impulse.y * scale });
                for (const body of localRagdoll.allBodies) {
                    Body.setVelocity(body, {
                        x: body.velocity.x + impulse.x * 0.05,
                        y: body.velocity.y + impulse.y * 0.05,
                    });
                }
            }

            function sendNetworkUpdate() {
                if (!connected || !ws || ws.readyState !== WebSocket.OPEN || !localRagdoll) return;
                const partsData = {};
                for (const [key, body] of Object.entries(localRagdoll.parts)) {
                    partsData[key] = { x: body.position.x, y: body.position.y, a: body.angle,
                        vx: body.velocity.x, vy: body.velocity.y, va: body.angularVelocity };
                }
                ws.send(JSON.stringify({ type: 'update', parts: partsData }));
                checkHitsOnRemotePlayers();
            }

            function checkHitsOnRemotePlayers() {
                if (!localRagdoll || remotePlayers.size === 0) return;
                const leftHand = getHandWorldPos(localRagdoll.parts.leftLowerArm, -1);
                const rightHand = getHandWorldPos(localRagdoll.parts.rightLowerArm, 1);
                const hands = [
                    { pos: leftHand, body: localRagdoll.parts.leftLowerArm },
                    { pos: rightHand, body: localRagdoll.parts.rightLowerArm },
                ];
                for (const hand of hands) {
                    const handSpeed = Math.abs(hand.body.angularVelocity) + Math.abs(hand.body.velocity.x) + Math.abs(hand.body.velocity.y);
                    if (handSpeed < 5) continue;
                    for (const [remoteId, rp] of remotePlayers) {
                        if (!rp.ragdollPartsData) continue;
                        const head = rp.ragdollPartsData.head;
                        const torso = rp.ragdollPartsData.upperTorso;
                        if (!head || !torso) continue;
                        const targets = [{ x: head.x, y: head.y, radius: 18 }, { x: torso.x, y: torso.y, radius: 28 }];
                        for (const target of targets) {
                            const dx = hand.pos.x - target.x;
                            const dy = hand.pos.y - target.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < target.radius + 15) {
                                ws.send(JSON.stringify({
                                    type: 'hit',
                                    targetId: remoteId,
                                    impulse: {
                                        x: hand.body.velocity.x * 1.2 + (dx / (dist || 1)) * 3,
                                        y: hand.body.velocity.y * 1.2 + (dy / (dist || 1)) * 3 - 1.5,
                                    },
                                }));
                                break;
                            }
                        }
                    }
                }
            }

            function getHandWorldPos(arm, side) {
                const angle = arm.angle;
                const halfLen = 13;
                return {
                    x: arm.position.x + Math.cos(angle) * halfLen * side * 0.7 + Math.sin(angle) * halfLen,
                    y: arm.position.y + Math.sin(angle) * halfLen * side * 0.7 - Math.cos(angle) * halfLen,
                };
            }

            function updateRemoteInterpolation(timestamp) {
                for (const [id, rp] of remotePlayers) {
                    if (rp.states.length >= 2) {
                        const now = timestamp;
                        let s0 = rp.states[0], s1 = rp.states[rp.states.length - 1];
                        for (let i = 0; i < rp.states.length - 1; i++) {
                            if (rp.states[i + 1].timestamp >= now) { s0 = rp.states[i]; s1 = rp.states[i + 1]; break; }
                        }
                        const tDiff = s1.timestamp - s0.timestamp;
                        let alpha = 0;
                        if (tDiff > 0) alpha = Math.max(0, Math.min(1, (now - s0.timestamp) / tDiff));
                        const interpParts = {};
                        for (const key of Object.keys(s1.parts)) {
                            const p0 = s0.parts[key], p1 = s1.parts[key];
                            if (p0 && p1) {
                                let a0 = p0.a, a1 = p1.a, diff = a1 - a0;
                                while (diff > Math.PI) diff -= Math.PI * 2;
                                while (diff < -Math.PI) diff += Math.PI * 2;
                                interpParts[key] = { x: p0.x + (p1.x - p0.x) * alpha, y: p0.y + (p1.y - p0.y) * alpha, a: a0 + diff * alpha };
                            } else if (p1) interpParts[key] = { ...p1 };
                        }
                        rp.ragdollPartsData = interpParts;
                    } else if (rp.states.length === 1) {
                        rp.ragdollPartsData = rp.states[0].parts;
                    }
                }
            }

            // ─────────────────────────────────────
            // RENDERING
            // ─────────────────────────────────────
            function render(timestamp) {
                ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
                bgGrad.addColorStop(0, '#1a2a3d'); bgGrad.addColorStop(0.5, '#1e2e42'); bgGrad.addColorStop(1, '#15202b');
                ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 1;
                for (let x = 60; x < GAME_WIDTH; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke(); }
                for (let y = 60; y < GAME_HEIGHT; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y); ctx.stroke(); }

                renderPlatforms();

                for (const [id, rp] of remotePlayers) {
                    if (rp.ragdollPartsData) {
                        renderRagdollFromData(rp.ragdollPartsData, rp.color, 0.7);
                        const h = rp.ragdollPartsData.head;
                        if (h) {
                            ctx.fillStyle = rp.color; ctx.font = 'bold 11px "Segoe UI", Arial, sans-serif'; ctx.textAlign = 'center';
                            ctx.fillText(id.replace('player_', 'Spiller '), h.x, h.y - 28);
                        }
                    }
                }

                if (localRagdoll) {
                    renderRagdollBodies(localRagdoll, localColor, 1.0);
                    const hp = localRagdoll.parts.head.position;
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px "Segoe UI", Arial, sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('DIG', hp.x, hp.y - 28);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(hp.x, hp.y, 32, 0, Math.PI * 2); ctx.stroke();
                }

                const deathGrad = ctx.createLinearGradient(0, RESPAWN_Y_THRESHOLD - 30, 0, RESPAWN_Y_THRESHOLD + 20);
                deathGrad.addColorStop(0, 'rgba(231,76,60,0)'); deathGrad.addColorStop(0.5, 'rgba(231,76,60,0.15)'); deathGrad.addColorStop(1, 'rgba(231,76,60,0.4)');
                ctx.fillStyle = deathGrad; ctx.fillRect(0, RESPAWN_Y_THRESHOLD - 30, GAME_WIDTH, 60);
                ctx.strokeStyle = 'rgba(231,76,60,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([10, 20]);
                ctx.beginPath(); ctx.moveTo(0, RESPAWN_Y_THRESHOLD); ctx.lineTo(GAME_WIDTH, RESPAWN_Y_THRESHOLD); ctx.stroke();
                ctx.setLineDash([]);
            }

            function renderPlatforms() {
                for (const plat of platforms) {
                    const v = plat.vertices;
                    ctx.fillStyle = '#3d5068'; ctx.strokeStyle = '#546e8a'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(v[0].x, v[0].y);
                    for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].x, v[i].y);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    const topY = Math.min(...v.map(p => p.y));
                    const minX = Math.min(...v.map(p => p.x)), maxX = Math.max(...v.map(p => p.x));
                    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.beginPath();
                    ctx.moveTo(minX, topY); ctx.lineTo(maxX, topY); ctx.stroke();
                }
                ctx.fillStyle = '#2c3d50'; ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GROUND_THICKNESS);
                ctx.fillStyle = '#3d5068'; ctx.fillRect(0, GROUND_Y, GAME_WIDTH, 6);
                ctx.strokeStyle = '#546e8a'; ctx.lineWidth = 2; ctx.strokeRect(0, GROUND_Y, GAME_WIDTH, GROUND_THICKNESS);
            }

            function renderRagdollFromData(partsData, color, alpha) {
                const order = ['leftLowerLeg','rightLowerLeg','leftUpperLeg','rightUpperLeg',
                    'lowerTorso','leftLowerArm','rightLowerArm','leftUpperArm','rightUpperArm','upperTorso','head'];
                const dims = {
                    head: { type: 'circle', r: 17 }, upperTorso: { type: 'rect', w: 28, h: 38 }, lowerTorso: { type: 'rect', w: 24, h: 34 },
                    leftUpperArm: { type: 'rect', w: 11, h: 28 }, rightUpperArm: { type: 'rect', w: 11, h: 28 },
                    leftLowerArm: { type: 'rect', w: 9, h: 26 }, rightLowerArm: { type: 'rect', w: 9, h: 26 },
                    leftUpperLeg: { type: 'rect', w: 13, h: 34 }, rightUpperLeg: { type: 'rect', w: 13, h: 34 },
                    leftLowerLeg: { type: 'rect', w: 11, h: 30 }, rightLowerLeg: { type: 'rect', w: 11, h: 30 },
                };
                const darker = darkenColor(color, 0.7), lighter = lightenColor(color, 0.25);
                for (const key of order) {
                    const d = partsData[key], dim = dims[key];
                    if (!d || !dim) continue;
                    ctx.save(); ctx.globalAlpha = alpha; ctx.translate(d.x, d.y); ctx.rotate(d.a);
                    if (dim.type === 'circle') {
                        const grad = ctx.createRadialGradient(-3,-4,dim.r*0.2,0,0,dim.r);
                        grad.addColorStop(0,lighter); grad.addColorStop(1,darker);
                        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,dim.r,0,Math.PI*2); ctx.fill();
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2.5; ctx.stroke();
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-5,-3,5,0,Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(5,-3,5,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-4,-3,2.2,0,Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(6,-3,2.2,0,Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0,4,6,0.1,Math.PI-0.1); ctx.stroke();
                    } else {
                        const grad = ctx.createLinearGradient(-dim.w/2,0,dim.w/2,0);
                        grad.addColorStop(0,darker); grad.addColorStop(0.5,color); grad.addColorStop(1,darker);
                        ctx.fillStyle = grad; ctx.fillRect(-dim.w/2,-dim.h/2,dim.w,dim.h);
                        ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 2; ctx.strokeRect(-dim.w/2,-dim.h/2,dim.w,dim.h);
                        ctx.fillStyle = lighter;
                        ctx.beginPath(); ctx.arc(-dim.w/2+3,-dim.h/2+3,3,0,Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(dim.w/2-3,-dim.h/2+3,3,0,Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                }
            }

            function renderRagdollBodies(ragdoll, color, alpha) {
                const data = {};
                for (const [k, b] of Object.entries(ragdoll.parts)) data[k] = { x: b.position.x, y: b.position.y, a: b.angle };
                renderRagdollFromData(data, color, alpha);
            }

            function darkenColor(hex, f) {
                const r = Math.round(parseInt(hex.slice(1,3),16)*f), g = Math.round(parseInt(hex.slice(3,5),16)*f), b = Math.round(parseInt(hex.slice(5,7),16)*f);
                return `rgb(${r},${g},${b})`;
            }
            function lightenColor(hex, f) {
                const r = Math.min(255,Math.round(parseInt(hex.slice(1,3),16)+(255-parseInt(hex.slice(1,3),16))*f));
                const g = Math.min(255,Math.round(parseInt(hex.slice(3,5),16)+(255-parseInt(hex.slice(3,5),16))*f));
                const b = Math.min(255,Math.round(parseInt(hex.slice(5,7),16)+(255-parseInt(hex.slice(5,7),16))*f));
                return `rgb(${r},${g},${b})`;
            }

            setInterval(() => {
                const now = performance.now();
                for (const [id, rp] of remotePlayers) {
                    if (now - rp.lastUpdate > 8000) {
                        remotePlayers.delete(id);
                        const rd = remoteRagdolls.get(id); if (rd) { rd.remove(); remoteRagdolls.delete(id); }
                        updatePlayerCount();
                    }
                }
            }, 3000);

            connectWebSocket();
            requestAnimationFrame(gameLoop);
            console.log('🎮 Ragdoll Fight – Dash 0.25, bløde kollisioner');
        })();
    </script>
</body>

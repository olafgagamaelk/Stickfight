<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brawl Blobs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100vw;
      max-height: 100vh;
      width: 800px;
      height: 600px;
      background: #87CEEB;
      cursor: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // =============================================
    // HELE KLIENT‑KODEN SAMLET I ÉT SCRIPT
    // =============================================

    // --- Globale variable ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    const socket = io();

    let localPlayer = null;
    let remotePlayers = {};
    let currentMapIndex = 0;
    let scores = [];
    let gameBullets = [];
    let visualBullets = [];
    let pickups = [];

    // --- Input (tastatur & mus) ---
    const keys = {
      left: false,
      right: false,
      up: false,
      shoot: false,
    };
    const mouse = { x: 400, y: 300 };

    window.addEventListener('keydown', (e) => {
      switch(e.code) {
        case 'KeyA': case 'ArrowLeft':  keys.left = true; e.preventDefault(); break;
        case 'KeyD': case 'ArrowRight': keys.right = true; e.preventDefault(); break;
        case 'KeyW': case 'ArrowUp':    keys.up = true; e.preventDefault(); break;
        case 'Space':                  keys.shoot = true; e.preventDefault(); break;
      }
    });
    window.addEventListener('keyup', (e) => {
      switch(e.code) {
        case 'KeyA': case 'ArrowLeft':  keys.left = false; e.preventDefault(); break;
        case 'KeyD': case 'ArrowRight': keys.right = false; e.preventDefault(); break;
        case 'KeyW': case 'ArrowUp':    keys.up = false; e.preventDefault(); break;
        case 'Space':                  keys.shoot = false; e.preventDefault(); break;
      }
    });
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouse.x = (e.clientX - rect.left) * scaleX;
      mouse.y = (e.clientY - rect.top) * scaleY;
    });

    // --- Fysik ---
    const Physics = {
      GRAVITY: 0.6,
      FRICTION: 0.8,
      MAX_SPEED: 5,
      ACCELERATION: 0.5,
      JUMP_VELOCITY: -12,

      resolveCollision(player, platforms) {
        player.onGround = false;
        for (let p of platforms) {
          if (player.x < p.x + p.w && player.x + player.w > p.x &&
              player.y < p.y + p.h && player.y + player.h > p.y) {
            const overlapLeft = (player.x + player.w) - p.x;
            const overlapRight = (p.x + p.w) - player.x;
            const overlapTop = (player.y + player.h) - p.y;
            const overlapBottom = (p.y + p.h) - player.y;
            const minX = Math.min(overlapLeft, overlapRight);
            const minY = Math.min(overlapTop, overlapBottom);
            if (minX < minY) {
              if (overlapLeft < overlapRight) {
                player.x = p.x - player.w;
              } else {
                player.x = p.x + p.w;
              }
              player.vx = 0;
            } else {
              if (overlapTop < overlapBottom) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
              } else {
                player.y = p.y + p.h;
                player.vy = 0;
              }
            }
          }
        }
      },

      pointInPlatforms(x, y, platforms) {
        for (let p of platforms) {
          if (x > p.x && x < p.x + p.w && y > p.y && y < p.y + p.h) return true;
        }
        return false;
      }
    };

    // --- Våben ---
    const WEAPONS = {
      pistol: { name: 'Pistol', damage: 25, cooldown: 300, bulletSpeed: 15, bulletSize: 3, bulletCount: 1, spreadAngle: 0 },
      shotgun: { name: 'Shotgun', damage: 15, cooldown: 600, bulletSpeed: 12, bulletSize: 2, bulletCount: 5, spreadAngle: 0.3 },
      rifle: { name: 'Rifle', damage: 40, cooldown: 800, bulletSpeed: 20, bulletSize: 4, bulletCount: 1, spreadAngle: 0 }
    };

    class WeaponPickup {
      constructor(x, y, weaponType) {
        this.x = x; this.y = y; this.w = 20; this.h = 20;
        this.weaponType = weaponType; this.active = true;
      }
    }

    function spawnWeaponPickups(platforms, count = 3) {
      const types = ['pistol', 'shotgun', 'rifle'];
      const pickups = [];
      for (let i = 0; i < count; i++) {
        const plat = platforms[Math.floor(Math.random() * platforms.length)];
        const x = plat.x + Math.random() * (plat.w - 20);
        const y = plat.y - 25;
        pickups.push(new WeaponPickup(x, y, types[i % types.length]));
      }
      return pickups;
    }

    // --- Baner ---
    const MAPS = [
      {
        platforms: [
          { x: 0, y: 550, w: 800, h: 50 },
          { x: 200, y: 400, w: 150, h: 20 },
          { x: 500, y: 350, w: 120, h: 20 },
          { x: 100, y: 250, w: 100, h: 20 },
          { x: 600, y: 200, w: 100, h: 20 },
        ],
        spawnPoints: [ { x: 100, y: 100 }, { x: 700, y: 100 }, { x: 400, y: 50 } ]
      },
      {
        platforms: [
          { x: 0, y: 550, w: 800, h: 50 },
          { x: 50, y: 450, w: 200, h: 20 },
          { x: 550, y: 450, w: 200, h: 20 },
          { x: 250, y: 350, w: 100, h: 20 },
          { x: 450, y: 350, w: 100, h: 20 },
          { x: 150, y: 250, w: 80, h: 20 },
          { x: 600, y: 250, w: 80, h: 20 },
        ],
        spawnPoints: [ { x: 50, y: 100 }, { x: 750, y: 100 }, { x: 400, y: 100 } ]
      },
      {
        platforms: [
          { x: 0, y: 550, w: 300, h: 50 },
          { x: 500, y: 550, w: 300, h: 50 },
          { x: 150, y: 400, w: 120, h: 20 },
          { x: 350, y: 400, w: 120, h: 20 },
          { x: 550, y: 300, w: 100, h: 20 },
          { x: 100, y: 200, w: 100, h: 20 },
          { x: 650, y: 200, w: 100, h: 20 },
        ],
        spawnPoints: [ { x: 100, y: 80 }, { x: 700, y: 80 }, { x: 400, y: 50 } ]
      }
    ];

    // --- Spillerklasser ---
    class LocalPlayer {
      constructor(id, spawnX, spawnY) {
        this.id = id; this.x = spawnX; this.y = spawnY;
        this.vx = 0; this.vy = 0; this.w = 36; this.h = 36;
        this.onGround = false; this.health = 100; this.maxHealth = 100;
        this.alive = true; this.weapon = WEAPONS.pistol;
        this.lastShotTime = 0; this.color = '#ff6600';
        this.respawnTimer = 0; this.aimAngle = 0;
      }

      update(input, platforms, dt) {
        if (!this.alive) {
          this.respawnTimer -= dt;
          if (this.respawnTimer <= 0) this.respawn();
          return;
        }
        const acc = Physics.ACCELERATION;
        if (input.keys.left) this.vx -= acc;
        if (input.keys.right) this.vx += acc;
        if (!input.keys.left && !input.keys.right) this.vx *= Physics.FRICTION;
        if (this.vx > Physics.MAX_SPEED) this.vx = Physics.MAX_SPEED;
        if (this.vx < -Physics.MAX_SPEED) this.vx = -Physics.MAX_SPEED;
        if (input.keys.up && this.onGround) {
          this.vy = Physics.JUMP_VELOCITY;
          this.onGround = false;
        }
        this.vy += Physics.GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        Physics.resolveCollision(this, platforms);
        if (this.x < 0) { this.x = 0; this.vx = 0; }
        if (this.x + this.w > 800) { this.x = 800 - this.w; this.vx = 0; }
        if (this.y > 600) { this.health = 0; this.die(); }
        this.aimAngle = Math.atan2(input.mouse.y - (this.y + this.h/2),
                                   input.mouse.x - (this.x + this.w/2));
        if (input.keys.shoot) this.tryShoot();
      }

      tryShoot() {
        const now = performance.now();
        if (now - this.lastShotTime < this.weapon.cooldown) return;
        this.lastShotTime = now;
        const bullets = [];
        const centerX = this.x + this.w / 2;
        const centerY = this.y + this.h / 2;
        const baseAngle = this.aimAngle;
        for (let i = 0; i < this.weapon.bulletCount; i++) {
          let angle = baseAngle;
          if (this.weapon.spreadAngle > 0) {
            const offset = (i / (this.weapon.bulletCount - 1) - 0.5) * this.weapon.spreadAngle * 2;
            angle += offset;
          }
          bullets.push(new Bullet(centerX, centerY, angle, this.weapon, this.id));
        }
        socket.emit('shoot', {
          originX: centerX, originY: centerY, angle: baseAngle, weaponType: this.weapon.name,
        });
        return bullets;
      }

      die() {
        this.alive = false;
        this.health = 0;
        this.respawnTimer = 3000;
      }

      respawn() {
        const map = MAPS[currentMapIndex];
        const sp = map.spawnPoints[Math.floor(Math.random() * map.spawnPoints.length)];
        this.x = sp.x; this.y = sp.y; this.vx = 0; this.vy = 0;
        this.health = this.maxHealth; this.alive = true;
        socket.emit('respawn');
      }

      draw(ctx) {
        if (!this.alive) return;
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(0, 0, this.w/2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        const eyeOffX = Math.cos(this.aimAngle)*6;
        const eyeOffY = Math.sin(this.aimAngle)*6;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-8+eyeOffX, -6+eyeOffY, 7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(8+eyeOffX, -6+eyeOffY, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-8+eyeOffX*1.5, -6+eyeOffY*1.5, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(8+eyeOffX*1.5, -6+eyeOffY*1.5, 3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(0, 5, 5, 0, Math.PI); ctx.stroke();
        ctx.restore();
      }
    }

    class RemotePlayer {
      constructor(id, health = 100) {
        this.id = id; this.x = 400; this.y = 300;
        this.targetX = 400; this.targetY = 300; this.vx = 0; this.vy = 0;
        this.w = 36; this.h = 36; this.health = health; this.maxHealth = 100;
        this.alive = true;
        this.color = '#' + Math.floor(Math.random()*16777215).toString(16);
      }

      setTarget(x, y, vx, vy) { this.targetX = x; this.targetY = y; this.vx = vx; this.vy = vy; }

      update(dt) {
        if (!this.alive) return;
        const lerp = 0.3;
        this.x += (this.targetX - this.x) * lerp;
        this.y += (this.targetY - this.y) * lerp;
      }

      draw(ctx) {
        if (!this.alive) return;
        ctx.save();
        ctx.translate(this.x+this.w/2, this.y+this.h/2);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(0,0,this.w/2,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-7,-5,6,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(7,-5,6,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-7,-5,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(7,-5,3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(0,4,4,0,Math.PI); ctx.stroke();
        ctx.restore();
      }
    }

    class Bullet {
      constructor(x, y, angle, weapon, ownerId) {
        this.x = x; this.y = y;
        this.vx = Math.cos(angle) * weapon.bulletSpeed;
        this.vy = Math.sin(angle) * weapon.bulletSpeed;
        this.radius = weapon.bulletSize; this.damage = weapon.damage;
        this.ownerId = ownerId; this.lifetime = 2000; this.active = true;
      }

      update(dt, platforms) {
        this.x += this.vx; this.y += this.vy;
        this.lifetime -= dt;
        if (this.lifetime <= 0) { this.active = false; return; }
        if (Physics.pointInPlatforms(this.x, this.y, platforms)) this.active = false;
        if (this.x<0 || this.x>800 || this.y<0 || this.y>600) this.active = false;
      }

      draw(ctx) {
        if (!this.active) return;
        ctx.fillStyle = '#ffff00';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
      }
    }

    // --- Renderer ---
    const Renderer = {
      drawBackground(ctx, map) {
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = '#8B4513';
        for (let p of map.platforms) {
          ctx.fillRect(p.x,p.y,p.w,p.h);
          ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(p.x,p.y,p.w,p.h);
        }
      },
      drawPickups(ctx, pickups) {
        for (let p of pickups) {
          if (!p.active) continue;
          ctx.fillStyle = '#FFD700'; ctx.fillRect(p.x,p.y,p.w,p.h);
          ctx.strokeStyle = '#000'; ctx.strokeRect(p.x,p.y,p.w,p.h);
          ctx.fillStyle = '#000'; ctx.font = '12px sans-serif';
          ctx.fillText(p.weaponType.charAt(0).toUpperCase(), p.x+5, p.y+15);
        }
      },
      drawUI(ctx, localPlayer, remotePlayers, scores) {
        if (localPlayer && localPlayer.alive) {
          ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif';
          ctx.fillText(`HP: ${localPlayer.health}`, 10, 30);
          ctx.fillStyle = '#f00'; ctx.fillRect(10,35,100,10);
          ctx.fillStyle = '#0f0';
          ctx.fillRect(10,35,100 * (localPlayer.health/localPlayer.maxHealth),10);
          ctx.strokeStyle = '#000'; ctx.strokeRect(10,35,100,10);
          ctx.fillText(`Våben: ${localPlayer.weapon.name}`, 10, 65);
        }
        ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
        ctx.fillText('Scoreboard', 650, 20);
        let y = 40;
        for (let s of scores) {
          const name = (s.id === localPlayer?.id) ? 'Dig' : s.id.substring(0,6);
          ctx.fillText(`${name}: ${s.kills}/${s.deaths}`, 650, y);
          y += 18;
        }
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(mouse.x-10, mouse.y); ctx.lineTo(mouse.x+10, mouse.y);
        ctx.moveTo(mouse.x, mouse.y-10); ctx.lineTo(mouse.x, mouse.y+10);
        ctx.stroke();
      },
      drawVisualBullets(ctx, visualBullets) {
        for (let b of visualBullets) {
          if (!b.active) continue;
          ctx.fillStyle = '#ff9999';
          ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
        }
      }
    };

    // --- Netværk ---
    socket.on('init', (data) => {
      localPlayer = new LocalPlayer(data.id, 400, 100);
      currentMapIndex = data.mapIndex;
      for (let p of data.players) {
        if (p.id !== data.id) remotePlayers[p.id] = new RemotePlayer(p.id, p.health);
      }
      scores = data.players.map(p => ({ id: p.id, kills: p.kills, deaths: p.deaths }));
    });

    socket.on('playerJoined', (data) => {
      if (data.id !== localPlayer.id) remotePlayers[data.id] = new RemotePlayer(data.id, data.health);
    });

    socket.on('playerMoved', (data) => {
      if (remotePlayers[data.id]) remotePlayers[data.id].setTarget(data.x, data.y, data.vx, data.vy);
    });

    socket.on('playerShoot', (data) => {
      const weapon = Object.values(WEAPONS).find(w => w.name === data.weaponType) || WEAPONS.pistol;
      for (let i = 0; i < weapon.bulletCount; i++) {
        let angle = data.angle;
        if (weapon.spreadAngle > 0) {
          const offset = (i/(weapon.bulletCount-1)-0.5)*weapon.spreadAngle*2;
          angle += offset;
        }
        visualBullets.push(new Bullet(data.originX, data.originY, angle, weapon, data.id));
      }
    });

    socket.on('healthUpdate', (data) => { if (localPlayer) localPlayer.health = data.health; });
    socket.on('playerDied', (data) => {
      if (data.targetId === localPlayer.id) localPlayer.die();
      else if (remotePlayers[data.targetId]) remotePlayers[data.targetId].alive = false;
    });
    socket.on('playerRespawned', (data) => {
      if (data.id === localPlayer.id) { /* respawn allerede håndteret */ }
      else if (remotePlayers[data.id]) { remotePlayers[data.id].alive = true; remotePlayers[data.id].health = data.health; }
    });
    socket.on('playerDisconnected', (data) => { delete remotePlayers[data.id]; });
    socket.on('scoreUpdate', (data) => { scores = data; });
    socket.on('mapChange', (data) => {
      currentMapIndex = data.mapIndex;
      gameBullets.length = 0; visualBullets.length = 0;
      if (localPlayer && localPlayer.alive) {
        const map = MAPS[currentMapIndex];
        const sp = map.spawnPoints[Math.floor(Math.random() * map.spawnPoints.length)];
        localPlayer.x = sp.x; localPlayer.y = sp.y; localPlayer.vx = 0; localPlayer.vy = 0;
      }
      pickups = spawnWeaponPickups(MAPS[currentMapIndex].platforms, 3);
    });

    // Send position 20 gange i sekundet
    setInterval(() => {
      if (localPlayer && localPlayer.alive) {
        socket.emit('playerUpdate', {
          x: localPlayer.x, y: localPlayer.y, vx: localPlayer.vx, vy: localPlayer.vy,
        });
      }
    }, 50);

    // --- Hovedløkke ---
    let lastTime = performance.now();
    function gameLoop(now) {
      const dt = Math.min(now - lastTime, 50);
      lastTime = now;
      const input = { keys, mouse };
      const map = MAPS[currentMapIndex];

      if (localPlayer) {
        localPlayer.update(input, map.platforms, dt);
        if (keys.shoot) {
          const newBullets = localPlayer.tryShoot();
          if (newBullets) gameBullets.push(...newBullets);
        }
        for (let p of pickups) {
          if (!p.active) continue;
          if (localPlayer.x < p.x+p.w && localPlayer.x+localPlayer.w > p.x &&
              localPlayer.y < p.y+p.h && localPlayer.y+localPlayer.h > p.y) {
            localPlayer.weapon = WEAPONS[p.weaponType];
            p.active = false;
            setTimeout(() => { p.active = true; }, 15000);
          }
        }
      }

      for (let id in remotePlayers) remotePlayers[id].update(dt);

      for (let i = gameBullets.length-1; i >= 0; i--) {
        const b = gameBullets[i];
        b.update(dt, map.platforms);
        if (!b.active) { gameBullets.splice(i,1); continue; }
        for (let id in remotePlayers) {
          const rp = remotePlayers[id];
          if (!rp.alive) continue;
          const closestX = Math.max(rp.x, Math.min(b.x, rp.x+rp.w));
          const closestY = Math.max(rp.y, Math.min(b.y, rp.y+rp.h));
          const dx = b.x - closestX, dy = b.y - closestY;
          if (dx*dx + dy*dy < b.radius*b.radius) {
            socket.emit('hit', { targetId: id, damage: b.damage, shooterId: localPlayer.id });
            b.active = false;
            gameBullets.splice(i,1);
            break;
          }
        }
      }

      for (let i = visualBullets.length-1; i >= 0; i--) {
        visualBullets[i].update(dt, map.platforms);
        if (!visualBullets[i].active) visualBullets.splice(i,1);
      }

      ctx.clearRect(0,0,800,600);
      Renderer.drawBackground(ctx, map);
      Renderer.drawPickups(ctx, pickups);
      for (let id in remotePlayers) remotePlayers[id].draw(ctx);
      if (localPlayer) localPlayer.draw(ctx);
      for (let b of gameBullets) b.draw(ctx);
      Renderer.drawVisualBullets(ctx, visualBullets);
      Renderer.drawUI(ctx, localPlayer, remotePlayers, scores);

      requestAnimationFrame(gameLoop);
    }

    pickups = spawnWeaponPickups(MAPS[0].platforms, 3);
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
